# Fly.io configuration for Caddie deployment
app = "caddie-platform"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

# WebSocket support
[[services.http_checks]]
  grace_period = "10s"
  interval = "30s"
  timeout = "5s"
  path = "/health"

[processes]
  app = "node server.js"
